services:
  - type: web
    name: phishguard
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python model/train.py
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /
